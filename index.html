<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نماذج ونظريات للعمل مع الأفراد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N4C1HT27G2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-N4C1HT27G2');
    </script>
</head>

<body>

    <div id="loading-screen">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <h2>جاري تحميل الامتحان...</h2>
            <p>إعداد 70 سؤالاً</p>
        </div>
    </div>

    <div class="bg-animation">
        <div class="shape circle shape-1"></div>
        <div class="shape square shape-2"></div>
        <div class="shape circle shape-3"></div>
        <div class="shape square shape-4"></div>
    </div>

    <div id="landing-page">
        <div class="landing-container">
            <div class="landing-header">
                <h1><i class="fas fa-graduation-cap"></i> نماذج ونظريات للعمل مع الأفراد</h1>
                <p>اختر الوضع المناسب للدراسة</p>
            </div>

            <div class="mode-cards">
                <div class="mode-card exam-card">
                    <div class="card-icon"><i class="fas fa-file-alt"></i></div>
                    <h2>الامتحان الأول</h2>
                    <p style="margin: 10px 0; font-size: 0.9rem; color: var(--text-color); opacity: 0.8;"> </p>
                    <div class="card-buttons">
                        <button class="card-btn btn-exam" onclick="window.location.href='امتحان1.html'">
                            <i class="fas fa-book-reader"></i> الامتحان الأول
                        </button>
                    </div>
                </div>

                <div class="mode-card exam-card">
                    <div class="card-icon" style="color: #e67e22; background: rgba(230, 126, 34, 0.15);"><i
                            class="fas fa-file-signature"></i></div>
                    <h2>الامتحان الثاني</h2>
                    <p style="margin: 10px 0; font-size: 0.9rem; color: var(--text-color); opacity: 0.8;"></p>
                    <div class="card-buttons">
                        <button class="card-btn btn-exam" style="background: linear-gradient(135deg, #e67e22, #d35400);"
                            onclick="window.location.href='امتحان2.html'">
                            <i class="fas fa-book-reader"></i> الامتحان الثاني
                        </button>
                    </div>
                </div>

                <div class="mode-card exam-card">
                    <div class="card-icon" style="color: #e67e22; background: rgba(230, 126, 34, 0.15);"><i
                            class="fas fa-file-contract"></i></div>
                    <h2>الامتحان الثالث</h2>
                    <p style="margin: 10px 0; font-size: 0.9rem; color: var(--text-color); opacity: 0.8;"></p>
                    <div class="card-buttons">
                        <button class="card-btn btn-exam" style="background: linear-gradient(135deg, #e67e22, #d35400);"
                            onclick="window.location.href='امتحان3.html'">
                            <i class="fas fa-book-reader"></i> الامتحان الثالث
                        </button>
                    </div>
                </div>

                <div class="mode-card mindmap-card">
                    <div class="card-icon" style="color: #9b59b6; background: rgba(155, 89, 182, 0.15);"><i
                            class="fas fa-sitemap"></i></div>
                    <h2>الخريطة الذهنية</h2>
                    <div class="card-buttons">
                        <button class="card-btn" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);"
                            onclick="window.location.href='الخريطة_الذهنية.html'">
                            <i class="fas fa-project-diagram"></i> عرض الخريطة
                        </button>
                    </div>
                </div>
            </div>

            <div class="landing-theme-switcher">
                <span>المظهر:</span>
                <button onclick="setTheme('')" title="داكن"><i class="fas fa-moon"></i></button>
                <button onclick="setTheme('light-mode')" title="فاتح"><i class="fas fa-sun"></i></button>
                <button onclick="setTheme('pro-mode')" title="Pro"><i class="fas fa-gem"></i></button>
                <button onclick="setTheme('contrast-mode')" title="تباين"><i class="fas fa-adjust"></i></button>
            </div>
            <div style="margin-top: 2rem; opacity: 0.7; font-size: 0.9rem; direction: ltr; font-family: sans-serif;">
                Created by Hazem Anter
            </div>
        </div>
    </div>

    <script>
        // Theme Management
        const THEME_KEY = 'exam_theme';
        function setTheme(name) {
            document.body.classList.remove('light-mode', 'pro-mode', 'contrast-mode');
            if (name) document.body.classList.add(name);
            localStorage.setItem(THEME_KEY, name);
        }
        function loadTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved) setTheme(saved);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 600);
        });

        window.setTheme = setTheme;
    </script>

</body>

</html>
